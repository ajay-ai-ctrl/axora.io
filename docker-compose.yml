version: "3.9"

# SmartKhet — Local Development Stack
# Run: docker-compose up -d
# Services: All microservices + PostgreSQL + MongoDB + Redis + Kafka + MLflow

x-common-env: &common-env
  POSTGRES_URL: postgresql://smartkhet:smartkhet@postgres:5432/smartkhet
  MONGODB_URL: mongodb://mongo:27017/smartkhet
  REDIS_URL: redis://redis:6379
  KAFKA_BOOTSTRAP_SERVERS: kafka:9092
  ML_INFERENCE_URL: http://ml-inference:8080
  AWS_REGION: ap-south-1
  S3_BUCKET_NAME: smartkhet-images-dev
  JWT_SECRET_KEY: dev-secret-key-change-in-production-min-32-chars
  MLFLOW_TRACKING_URI: http://mlflow:5000
  ENV: development

services:

  # ── Databases ───────────────────────────────────────────────────────────────

  postgres:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_USER: smartkhet
      POSTGRES_PASSWORD: smartkhet
      POSTGRES_DB: smartkhet
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./data/schemas/postgres_schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U smartkhet"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongo:
    image: mongo:7.0
    environment:
      MONGO_INITDB_DATABASE: smartkhet
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.2-alpine
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ── Kafka ────────────────────────────────────────────────────────────────────

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    depends_on: [zookeeper]
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_DEFAULT_REPLICATION_FACTOR: 1
      KAFKA_LOG_RETENTION_HOURS: 168
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 15s
      timeout: 10s
      retries: 5

  kafka-init:
    image: confluentinc/cp-kafka:7.6.0
    depends_on: [kafka]
    entrypoint: ["/bin/bash", "-c"]
    command: |
      "
      kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic disease.events --partitions 6 --replication-factor 1
      kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic soil.events --partitions 3 --replication-factor 1
      kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic advisory.events --partitions 6 --replication-factor 1
      kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic weather.events --partitions 3 --replication-factor 1
      kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic notification.outbound --partitions 12 --replication-factor 1
      echo 'Kafka topics created'
      "

  # ── MLflow ───────────────────────────────────────────────────────────────────

  mlflow:
    image: python:3.11-slim
    command: >
      bash -c "pip install mlflow psycopg2-binary boto3 -q &&
               mlflow server
               --host 0.0.0.0
               --port 5000
               --backend-store-uri postgresql://smartkhet:smartkhet@postgres:5432/mlflow
               --default-artifact-root s3://smartkhet-mlflow-dev/artifacts"
    ports:
      - "5000:5000"
    depends_on: [postgres]
    environment:
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-minioadmin}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-minioadmin}
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data

  # ── Microservices ────────────────────────────────────────────────────────────

  farmer-service:
    build:
      context: ./backend/farmer_service
      dockerfile: ../../infra/docker/Dockerfile.python
    ports:
      - "8001:8001"
    environment:
      <<: *common-env
      PORT: 8001
      SERVICE_NAME: farmer-service
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend/farmer_service:/app
      - ./backend/shared:/app/shared
    command: uvicorn main:app --host 0.0.0.0 --port 8001 --reload
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  crop-advisory-service:
    build:
      context: ./backend/crop_advisory_service
      dockerfile: ../../infra/docker/Dockerfile.python
    ports:
      - "8002:8002"
    environment:
      <<: *common-env
      PORT: 8002
      SERVICE_NAME: crop-advisory-service
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend/crop_advisory_service:/app
      - ./ml/crop_recommendation/models:/models/crop
    command: uvicorn main:app --host 0.0.0.0 --port 8002 --reload

  disease-service:
    build:
      context: ./backend/disease_service
      dockerfile: ../../infra/docker/Dockerfile.python
    ports:
      - "8003:8003"
    environment:
      <<: *common-env
      PORT: 8003
      SERVICE_NAME: disease-service
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    volumes:
      - ./backend/disease_service:/app
      - ./data/seeds:/app/data/seeds
    command: uvicorn main:app --host 0.0.0.0 --port 8003 --reload

  market-service:
    build:
      context: ./backend/market_service
      dockerfile: ../../infra/docker/Dockerfile.python
    ports:
      - "8004:8004"
    environment:
      <<: *common-env
      PORT: 8004
      SERVICE_NAME: market-service
      AGMARKNET_API_KEY: ${AGMARKNET_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend/market_service:/app
      - ./data/seeds:/app/data/seeds
    command: uvicorn main:app --host 0.0.0.0 --port 8004 --reload

  nlp-voice-service:
    build:
      context: ./backend/nlp_voice_service
      dockerfile: ../../infra/docker/Dockerfile.python
    ports:
      - "8005:8005"
    environment:
      <<: *common-env
      PORT: 8005
      SERVICE_NAME: nlp-voice-service
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./backend/nlp_voice_service:/app
      - ./ml/nlp_voice/models:/models/nlp
    command: uvicorn main:app --host 0.0.0.0 --port 8005 --reload

  notification-service:
    build:
      context: ./backend/notification_service
      dockerfile: ../../infra/docker/Dockerfile.node
    ports:
      - "8006:8006"
    environment:
      <<: *common-env
      PORT: 8006
      MSG91_API_KEY: ${MSG91_API_KEY:-}
      META_WHATSAPP_TOKEN: ${META_WHATSAPP_TOKEN:-}
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend/notification_service:/app
    command: node --watch index.js

  ml-inference:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.ml
    ports:
      - "8080:8080"
    environment:
      <<: *common-env
      PORT: 8080
      MODEL_DIR: /models
    volumes:
      - ./ml:/app/ml
      - ml_models:/models
    command: python -m ray.serve run ml/serve_config.yaml
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 0          # Set to 1 for GPU in dev if available
              capabilities: [gpu]

  whatsapp-bot:
    build:
      context: ./whatsapp_bot
      dockerfile: ../infra/docker/Dockerfile.node
    ports:
      - "3000:3000"
    environment:
      <<: *common-env
      PORT: 3000
      META_VERIFY_TOKEN: ${META_VERIFY_TOKEN:-smartkhet-dev-verify}
      META_WHATSAPP_TOKEN: ${META_WHATSAPP_TOKEN:-}
      META_PHONE_NUMBER_ID: ${META_PHONE_NUMBER_ID:-}
    depends_on:
      - farmer-service
      - disease-service
      - market-service
    volumes:
      - ./whatsapp_bot:/app
    command: node --watch index.js

  # ── Observability ────────────────────────────────────────────────────────────

  prometheus:
    image: prom/prometheus:v2.51.0
    ports:
      - "9090:9090"
    volumes:
      - ./infra/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=15d'

  grafana:
    image: grafana/grafana:10.3.0
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: smartkhet123
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infra/grafana/dashboards:/etc/grafana/provisioning/dashboards
    depends_on: [prometheus]

volumes:
  postgres_data:
  mongo_data:
  redis_data:
  kafka_data:
  zookeeper_data:
  minio_data:
  ml_models:
  prometheus_data:
  grafana_data:

networks:
  default:
    name: smartkhet-network
    driver: bridge
